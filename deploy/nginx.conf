# Voice AI Agent — Nginx configuration
# Place in /etc/nginx/sites-available/voice_ai_agent
# Then: sudo ln -s /etc/nginx/sites-available/voice_ai_agent /etc/nginx/sites-enabled/

upstream django {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name your-domain.com;  # Replace with your server's IP or domain

    client_max_body_size 50M;

    access_log /var/log/nginx/voice_ai_agent_access.log;
    error_log  /var/log/nginx/voice_ai_agent_error.log;

    location /static/ {
        alias /opt/voice_ai_agent/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /media/calls/;
        internal;  # Only accessible internally (not directly by browser)
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
