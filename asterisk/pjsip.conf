; =============================================================================
; pjsip.conf — Future Smart Support Voice AI Agent
; Clean registration-based configuration
; =============================================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060


; =============================================================================
; HT813
; HT813 registers to Asterisk using:
;   SIP User ID: ht813
;   Authenticate ID: ht813
;   Password: W0rk@786
; =============================================================================

[ht813]
type=endpoint
transport=transport-udp
context=from-ht813
disallow=all
allow=ulaw,alaw
auth=ht813
aors=ht813
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
send_pai=yes
callerid=HT813 <ht813>

[ht813]
type=auth
auth_type=userpass
username=ht813
password=W0rk@786

[ht813]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=60


; =============================================================================
; Human agent softphone
; Register this from a SIP phone only when needed
; =============================================================================

[agent200]
type=endpoint
transport=transport-udp
context=internal
disallow=all
allow=ulaw,alaw
auth=agent200
aors=agent200
direct_media=no
callerid=Agent 200 <200>

[agent200]
type=auth
auth_type=userpass
username=agent200
password=CHANGE_ME_AGENT200_PASSWORD

[agent200]
type=aor
max_contacts=2
remove_existing=no
qualify_frequency=60
