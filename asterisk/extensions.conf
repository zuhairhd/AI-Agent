; =============================================================================
; extensions.conf — Future Smart Support Voice AI Agent
; =============================================================================
;
; OVERVIEW
; --------
; Inbound calls arrive from the Grandstream HT813 ATA via PJSIP.
; The HT813 registers to Asterisk and sends calls on extension "s" (FXO style)
; or via a DID pattern (_X.).  Both are handled below.
;
; Call flow:
;   [from-ht813] → [lang-select] → [ai-agent] → AGI conversation loop
;
; ASSUMPTIONS
; -----------
; • PJSIP is configured in pjsip.conf.
;   Human agent softphone registers as endpoint [agent200] (username=agent200).
; • The AGI script is installed at:
;     /var/lib/asterisk/agi-bin/voice_agent.agi   (chmod +x, python3 shebang)
; • Custom sounds in /var/lib/asterisk/sounds/custom/:
;     language_menu      — bilingual DTMF menu prompt
;     please_wait_ar     — Arabic wait prompt
;     please_wait_en     — English wait prompt
;   Each prompt must exist in at least one of: .ulaw  .alaw  .wav
;   Asterisk auto-selects the native codec format — no transcoding needed.
;   Run generate_prompts.py to produce all three formats automatically.
;
; HOT RELOAD (no full restart needed):
;   asterisk -rx "dialplan reload"
; =============================================================================

[globals]
; HUMAN_AGENT_ENDPOINT must match the PJSIP endpoint name in pjsip.conf.
HUMAN_AGENT_ENDPOINT=agent200
AGI_SCRIPT=/var/lib/asterisk/agi-bin/voice_agent.agi
; Default language fallback (overridden by lang-select)
LANG_CHOICE=en

; =============================================================================
; Inbound context — calls arrive here from HT813 PJSIP endpoint
; =============================================================================
[from-ht813]

; ── Extension "s": FXO/HT813 delivers calls here when no DID is available ──
exten => s,1,NoOp(Inbound call on 's' from ${CALLERID(num)} via HT813)
 same => n,Goto(lang-select,start,1)

; ── DID pattern: handles calls with explicit numbers ──────────────────────
exten => _X.,1,NoOp(Inbound call on ${EXTEN} from ${CALLERID(num)} via HT813)
 same => n,Goto(lang-select,start,1)

; Hangup handler
exten => h,1,NoOp(Call ended — UNIQUEID=${UNIQUEID})

; =============================================================================
; Language selection — bilingual DTMF menu
;
; Audio file: custom/language_menu  (Asterisk picks .ulaw/.alaw/.wav — best fit)
;   Content: "For Arabic press 1. For English press 2.
;             للمتابعة باللغة العربية اضغط 1.
;             وللمتابعة باللغة الإنجليزية اضغط 2."
;
; This is the ONLY greeting the caller hears — no separate welcome message.
;
; Caller presses:
;   1 → LANG_CHOICE=ar → ai-agent
;   2 → LANG_CHOICE=en → ai-agent
;   timeout (t) or invalid (i) → retry up to 2 times → goodbye + Wait(1)
; =============================================================================
[lang-select]

; Entry point — answer the call and initialise retry counter
exten => start,1,NoOp(Language selection — caller=${CALLERID(num)})
 same => n,Answer()
 same => n,Set(LANG_RETRIES=0)
 same => n,Set(LANG_CHOICE=en)
 same => n,Goto(lang-menu,1)

; Menu loop — Background() plays the file and intercepts DTMF immediately.
; WaitExten() covers the remaining silence after playback ends.
exten => lang-menu,1,NoOp(Language menu — attempt ${LANG_RETRIES})
 same => n,Background(custom/language_menu)
 same => n,WaitExten(5)

; ── Digit 1 → Arabic ──────────────────────────────────────────────────────
exten => 1,1,NoOp(Arabic selected)
 same => n,Set(LANG_CHOICE=ar)
 same => n,Goto(ai-agent,start,1)

; ── Digit 2 → English ─────────────────────────────────────────────────────
exten => 2,1,NoOp(English selected)
 same => n,Set(LANG_CHOICE=en)
 same => n,Goto(ai-agent,start,1)

; ── Timeout — no key pressed within 5 s ───────────────────────────────────
exten => t,1,NoOp(No input — LANG_RETRIES=${LANG_RETRIES})
 same => n,Set(LANG_RETRIES=$[${LANG_RETRIES} + 1])
 same => n,GotoIf($[${LANG_RETRIES} < 2]?lang-menu,1)
 same => n,Playback(vm-goodbye)
 same => n,Wait(1)
 same => n,Hangup()

; ── Invalid key pressed ────────────────────────────────────────────────────
exten => i,1,NoOp(Invalid key — LANG_RETRIES=${LANG_RETRIES})
 same => n,Set(LANG_RETRIES=$[${LANG_RETRIES} + 1])
 same => n,GotoIf($[${LANG_RETRIES} < 2]?lang-menu,1)
 same => n,Playback(vm-goodbye)
 same => n,Wait(1)
 same => n,Hangup()

; Hangup handler
exten => h,1,NoOp(lang-select call ended — UNIQUEID=${UNIQUEID})

; =============================================================================
; AI agent logic.
; [lang-select] already called Answer() — do NOT call Answer() again here.
; LANG_CHOICE is already set as a channel variable by lang-select.
; =============================================================================
[ai-agent]

exten => start,1,NoOp(AI agent start — caller=${CALLERID(num)} lang=${LANG_CHOICE})
 ; Answer() intentionally removed — call is already answered by [lang-select].
 same => n,Set(CALLERID_NUM=${CALLERID(num)})
 same => n,Set(UNIQUE_ID=${UNIQUEID})
 same => n,Set(TRANSFER_NEEDED=0)
 same => n,AGI(${AGI_SCRIPT})
 same => n,GotoIf($["${TRANSFER_NEEDED}" = "1"]?transfer,1)
 same => n,Playback(vm-goodbye)
 same => n,Wait(1)
 same => n,Hangup()

; ── Transfer branch: route to human agent endpoint ────────────────────────
exten => transfer,1,NoOp(Transferring to human agent ${HUMAN_AGENT_ENDPOINT})
 same => n,Dial(PJSIP/${HUMAN_AGENT_ENDPOINT},30,tT)
 same => n,Playback(vm-nobodyavail)
 same => n,Wait(1)
 same => n,Hangup()

; Hangup handler
exten => h,1,NoOp(ai-agent call ended)

; =============================================================================
; Internal extensions (human agents answer here on their softphones)
; =============================================================================
[internal]

exten => 200,1,NoOp(Internal call to human agent 200)
 same => n,Dial(PJSIP/agent200,30,tT)
 same => n,Voicemail(200@default,u)
 same => n,Hangup()

; =============================================================================
; Health check
; =============================================================================
[health-check]
exten => 9999,1,Answer()
 same => n,Playback(beep)
 same => n,Hangup()
