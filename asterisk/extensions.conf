; ============================================================
; Asterisk Dialplan for Voice AI Agent
; Place this in /etc/asterisk/extensions.conf
; or include it from your main extensions.conf
; ============================================================

[globals]
DJANGO_API_URL=http://localhost:8000/api/call/
ASTERISK_SECRET=your-shared-secret-here
RECORDINGS_DIR=/media/calls
WELCOME_MSG=custom/welcome-message

[incoming]
; Entry point — adapt exten to your DID number
exten => s,1,NoOp(Incoming call from ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(${WELCOME_MSG})
 same => n,Wait(1)
 same => n,Set(RECORDING_FILE=${RECORDINGS_DIR}/${CALLERID(num)}-${EPOCH})
 same => n,Record(${RECORDING_FILE}.wav,3,30,k)
 same => n,NoOp(Recording saved: ${RECORDING_FILE}.wav)
 same => n,AGI(django_notify.sh,${CALLERID(num)},${RECORDING_FILE}.wav)
 same => n,Playback(custom/processing-message)
 same => n,Hangup()

exten => h,1,NoOp(Call ended from ${CALLERID(num)})
